spring:
  application:
    name: gb-backend

  profiles:
    default: local

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false #需要檢查語法再改 true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Taipei

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 15MB      # 單一檔案最大允許 15MB (夠容納大部分手機直出照片)
      max-request-size: 50MB   # 整個 Request (最多3張圖+文字) 最大允許 50MB

# 👇 將 Line 的設定抽出來，不要讓 Spring Security 去自動攔截
line:
  api:
    client-id: ${GBC_LINE_CHANNEL_ID}
    client-secret: ${GBC_LINE_CHANNEL_SECRET}
    token-uri: https://api.line.me/oauth2/v2.1/token
    user-info-uri: https://api.line.me/v2/profile
    # LINE callback URL 依啟用的 Spring profile 設定，避免本地與正式環境互相覆蓋。
server:
  port: 8080
application:
  security:
    jwt:
      # 這是一組隨機生成的 256-bit Base64 字串，千萬不要外流，也不要隨便改，否則所有人的 Token 都會失效！
      # 你可以用線上工具生成一組新的，長度至少要 32 個字元轉 Base64。
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      # Token 過期時間：這裡設定為 30 天 (30 * 24 * 60 * 60 * 1000 毫秒)
      #expiration: 2592000000
      expiration: 604800000
logging:
  level:
    com.costco.gb: DEBUG
    org.springframework.security: INFO
  pattern:
    # 自訂 Log 格式，加入 [%X{traceId}]
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%15.15t] [%X{traceId}] %-40.40logger{39} : %m%n"
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: "jdbc:mysql://localhost:3306/gbc?useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true&sessionVariables=time_zone='%2B08:00'"
    username: ${DB_USERNAME:root}
    password: ${GBC_DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

line:
  api:
    # 本地開發使用 React dev server 的 LINE callback。
    redirect-uri: "http://localhost:5173/login/callback"

