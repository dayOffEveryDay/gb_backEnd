spring:
  application:
    name: gb-backend

  datasource:
    url: jdbc:mysql://localhost:3306/gb_db?useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      client:
        registration:
          line:
            client-id: ${LINE_CLIENT_ID:your-line-client-id}
            client-secret: ${LINE_CLIENT_SECRET:your-line-client-secret}
            scope: profile, openid, email
            redirect-uri: "{baseUrl}/login/oauth2/code/line"
            authorization-grant-type: authorization_code
            client-name: Line
        provider:
          line:
            authorization-uri: https://access.line.me/oauth2/v2.1/authorize
            token-uri: https://api.line.me/oauth2/v2.1/token
            user-info-uri: https://api.line.me/v2/profile
            user-name-attribute: userId

server:
  port: 8080

logging:
  level:
    com.costco.gb: DEBUG
    org.springframework.security: INFO
